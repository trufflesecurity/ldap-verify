name: PR

on:
  pull_request:
    branches: [ main ]

jobs:
  gomod:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ['1.24']
    name: Go ${{ matrix.go }}.x PR Validate (Modules)
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
      - name: Start glauth LDAP server
        run: |
          cd glauth
          openssl req -x509 -newkey rsa:4096 \
            -keyout glauth.key -out glauth.crt \
            -days 1 -nodes -subj "/CN=localhost" 2>/dev/null
          curl -fsSL -o glauth-bin \
            https://github.com/glauth/glauth/releases/download/GLAuth-v2.5.0/glauth-linux-amd64
          chmod +x glauth-bin
          ./glauth-bin -c testing.cfg &
          sleep 2
      - name: Build and Validate
        run: |
          go vet .
          go test .
          go test -cover -race -cpu 1,2,4 .
          go build .

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          only-new-issues: true
